<svg viewBox="0 0 1000 224" xmlns="http://www.w3.org/2000/svg" width="1000" height="224" role="img" aria-label="Footer banner for {{DISPLAY_NAME}}">
  <defs>
    <linearGradient id="footer-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0" />
      <stop offset="50%" stop-color="#{{ACCENT}}" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="footer-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#{{ACCENT}}" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="fade-up" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#{{BG}}" />
      <stop offset="100%" stop-color="#{{BG}}" stop-opacity="0" />
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.06" />
    </pattern>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .mono { font-family: "Ubuntu Mono", "JetBrains Mono", "Fira Code", "SF Mono", "Consolas", monospace; letter-spacing: 0.35px; }
      .ui { font-family: "Ubuntu", "Inter", "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 500; }
      .display { font-family: "Ubuntu Condensed", "Bebas Neue", "Oswald", "Impact", sans-serif; letter-spacing: 1.5px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1000" height="224" fill="#{{BG}}" />
  <rect width="1000" height="224" fill="url(#scanlines)" opacity="0.3" />

  <!-- Falling particles -->
  <g opacity="0.5">
    <circle cx="92" cy="-8" r="1.6" fill="#{{ACCENT}}"><animate attributeName="cy" values="-8;234" dur="6.8s" repeatCount="indefinite" /><animate attributeName="cx" values="92;104;86" dur="6.8s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;0.6;0" dur="6.8s" repeatCount="indefinite" /></circle>
    <circle cx="246" cy="-14" r="1.2" fill="#{{SNOW}}"><animate attributeName="cy" values="-14;234" dur="5.6s" repeatCount="indefinite" begin="-1.4s" /><animate attributeName="cx" values="246;234;252" dur="5.6s" repeatCount="indefinite" begin="-1.4s" /><animate attributeName="opacity" values="0;0.5;0" dur="5.6s" repeatCount="indefinite" begin="-1.4s" /></circle>
    <circle cx="434" cy="-10" r="1.8" fill="#{{ACCENT}}"><animate attributeName="cy" values="-10;234" dur="7.4s" repeatCount="indefinite" begin="-3s" /><animate attributeName="cx" values="434;446;428" dur="7.4s" repeatCount="indefinite" begin="-3s" /><animate attributeName="opacity" values="0;0.55;0" dur="7.4s" repeatCount="indefinite" begin="-3s" /></circle>
    <circle cx="618" cy="-6" r="1.3" fill="#{{SNOW}}"><animate attributeName="cy" values="-6;234" dur="5.2s" repeatCount="indefinite" begin="-2.2s" /><animate attributeName="cx" values="618;608;624" dur="5.2s" repeatCount="indefinite" begin="-2.2s" /><animate attributeName="opacity" values="0;0.45;0" dur="5.2s" repeatCount="indefinite" begin="-2.2s" /></circle>
    <circle cx="796" cy="-16" r="2.0" fill="#{{ACCENT}}"><animate attributeName="cy" values="-16;234" dur="6.2s" repeatCount="indefinite" begin="-4s" /><animate attributeName="cx" values="796;808;790" dur="6.2s" repeatCount="indefinite" begin="-4s" /><animate attributeName="opacity" values="0;0.6;0" dur="6.2s" repeatCount="indefinite" begin="-4s" /></circle>
    <circle cx="934" cy="-12" r="1.5" fill="#{{SNOW}}"><animate attributeName="cy" values="-12;234" dur="7.8s" repeatCount="indefinite" begin="-1s" /><animate attributeName="cx" values="934;946;928" dur="7.8s" repeatCount="indefinite" begin="-1s" /><animate attributeName="opacity" values="0;0.4;0" dur="7.8s" repeatCount="indefinite" begin="-1s" /></circle>
  </g>

  <!-- Mini skyline at bottom -->
  <g transform="translate(0 116)">
    <path d="M0 100 L0 62 L24 62 L24 38 L48 38 L48 100 Z" fill="#04040c" />
    <path d="M40 100 L40 48 L68 48 L68 22 L92 22 L92 100 Z" fill="#08081a" />
    <path d="M86 100 L86 56 L112 56 L112 14 L138 14 L138 100 Z" fill="#06061a" />
    <path d="M840 100 L840 52 L868 52 L868 24 L892 24 L892 100 Z" fill="#08081a" />
    <path d="M882 100 L882 48 L908 48 L908 8 L934 8 L934 100 Z" fill="#06061a" />
    <path d="M926 100 L926 38 L952 38 L952 16 L978 16 L978 100 Z" fill="#08081a" />
    <!-- Beam from right buildings -->
    <polygon points="906,42 1000,2 1000,28 938,64" fill="url(#footer-beam)" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" values="-6 906 42;6 906 42;-6 906 42" dur="5s" repeatCount="indefinite" />
    </polygon>
    <!-- Window flickers -->
    <rect x="50" y="58" width="3" height="5" fill="#{{WINDOW}}"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.4s" repeatCount="indefinite" /></rect>
    <rect x="96" y="38" width="3" height="5" fill="#{{WINDOW}}"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="4.8s" repeatCount="indefinite" /></rect>
    <rect x="852" y="42" width="3" height="5" fill="#{{WINDOW}}"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.6s" repeatCount="indefinite" /></rect>
    <rect x="940" y="28" width="3" height="5" fill="#{{WINDOW}}"><animate attributeName="opacity" values="0.7;0.12;0.7" dur="5.2s" repeatCount="indefinite" /></rect>
  </g>

  <!-- Fade overlay for smooth blending -->
  <rect x="130" y="116" width="740" height="108" fill="url(#fade-up)" opacity="0.6" />

  <!-- Text content -->
  <g transform="translate(50 48)">
    <text class="mono" fill="#{{ACCENT}}" font-size="12">SIGNAL.LOCK // DARK KNIGHT PROTOCOL</text>
    <text y="40" class="display" fill="#{{TEXT}}" font-size="30">TRACKING {{DISPLAY_NAME}} ACROSS THE CITY GRID</text>
    <text y="70" class="mono" fill="#{{MUTED}}" font-size="13">LIVE STATS // CONTRIBUTION SNAKE // GOTHAM MOTION // {{YEAR}}</text>
  </g>

  <!-- Bottom chip row -->
  <g transform="translate(158 146)">
    <rect width="184" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" stroke-opacity="0.5" />
    <rect x="12" y="9" width="6" height="6" rx="3" fill="#{{ACCENT}}" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite" />
    </rect>
    <text x="92" y="16" text-anchor="middle" class="mono" fill="#{{ACCENT}}" font-size="11">GenAI systems</text>

    <rect x="200" width="184" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" stroke-opacity="0.5" />
    <rect x="212" y="9" width="6" height="6" rx="3" fill="#{{ACCENT_2}}">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.7s" repeatCount="indefinite" />
    </rect>
    <text x="292" y="16" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="11">MLOps workflows</text>

    <rect x="400" width="184" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" stroke-opacity="0.5" />
    <rect x="412" y="9" width="6" height="6" rx="3" fill="#{{TEXT}}">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="492" y="16" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="11">AWS + Kubernetes</text>
  </g>

  <!-- Animated bottom glow line -->
  <line x1="50" y1="196" x2="950" y2="196" stroke="#{{EDGE}}" stroke-width="1" opacity="0.4" />
  <rect x="50" y="194" width="140" height="4" rx="2" fill="url(#footer-glow)">
    <animate attributeName="x" values="50;810;50" dur="3.8s" repeatCount="indefinite" />
  </rect>

  <!-- Bat icon -->
  <g transform="translate(860 52)" opacity="0.6">
    <path d="M0,-6 C-5,-10 -12,-9 -16,-3 C-20,-3 -25,-6 -30,-12 C-31,-5 -28,0 -22,4 C-17,7 -12,8 -6,5 C-5,10 -3,14 0,18 C3,14 5,10 6,5 C12,8 17,7 22,4 C28,0 31,-5 30,-12 C25,-6 20,-3 16,-3 C12,-9 5,-10 0,-6 Z" fill="#{{ACCENT}}">
      <animate attributeName="opacity" values="0.35;0.8;0.35" dur="5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Blinking cursor -->
  <text x="920" y="60" class="mono" fill="#{{ACCENT_2}}" font-size="13">exit 0 <tspan fill="#{{TEXT}}">█</tspan><tspan fill="#{{TEXT}}"><animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" /></tspan></text>

  <!-- Bottom accent -->
  <rect x="0" y="220" width="1000" height="4" fill="#{{ACCENT}}" opacity="0.08">
    <animate attributeName="opacity" values="0.04;0.12;0.04" dur="3s" repeatCount="indefinite" />
  </rect>
</svg>
