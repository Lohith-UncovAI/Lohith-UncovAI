<svg viewBox="0 0 1000 182" xmlns="http://www.w3.org/2000/svg" width="1000" height="182" role="img" aria-label="Footer banner for {{DISPLAY_NAME}}">
  <defs>
    <linearGradient id="footer-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0" />
      <stop offset="50%" stop-color="#{{ACCENT}}" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="footer-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0.28" />
      <stop offset="40%" stop-color="#{{ACCENT}}" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <style>
      .mono { font-family: "Ubuntu Mono", "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Ubuntu", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .display { font-family: "Ubuntu Condensed", "Ubuntu", "Avenir Next Condensed", "Segoe UI", sans-serif; letter-spacing: 0.4px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1000" height="182" fill="#{{BG}}" />

  <g opacity="0.72">
    <circle cx="112" cy="-8" r="1.8" fill="#{{SNOW}}"><animate attributeName="cy" values="-8;198" dur="7.2s" repeatCount="indefinite" /><animate attributeName="cx" values="112;124;106" dur="7.2s" repeatCount="indefinite" /></circle>
    <circle cx="286" cy="-14" r="1.5" fill="#{{SNOW}}"><animate attributeName="cy" values="-14;198" dur="6.1s" repeatCount="indefinite" begin="-1.6s" /><animate attributeName="cx" values="286;274;292" dur="6.1s" repeatCount="indefinite" begin="-1.6s" /></circle>
    <circle cx="494" cy="-10" r="2" fill="#{{SNOW}}"><animate attributeName="cy" values="-10;198" dur="8.1s" repeatCount="indefinite" begin="-3.4s" /><animate attributeName="cx" values="494;506;488" dur="8.1s" repeatCount="indefinite" begin="-3.4s" /></circle>
    <circle cx="702" cy="-8" r="1.4" fill="#{{SNOW}}"><animate attributeName="cy" values="-8;198" dur="5.8s" repeatCount="indefinite" begin="-2.4s" /><animate attributeName="cx" values="702;692;708" dur="5.8s" repeatCount="indefinite" begin="-2.4s" /></circle>
    <circle cx="886" cy="-16" r="2.2" fill="#{{SNOW}}"><animate attributeName="cy" values="-16;198" dur="7.4s" repeatCount="indefinite" begin="-4.1s" /><animate attributeName="cx" values="886;898;880" dur="7.4s" repeatCount="indefinite" begin="-4.1s" /></circle>
  </g>

  <g transform="translate(0 74)">
    <path d="M0 90 L0 58 L28 58 L28 30 L58 30 L58 90 Z" fill="#06090f" />
    <path d="M48 90 L48 46 L82 46 L82 16 L108 16 L108 90 Z" fill="#0d121c" />
    <path d="M104 90 L104 58 L134 58 L134 10 L162 10 L162 90 Z" fill="#09101a" />
    <path d="M840 90 L840 50 L874 50 L874 18 L902 18 L902 90 Z" fill="#0d121c" />
    <path d="M888 90 L888 54 L918 54 L918 8 L948 8 L948 90 Z" fill="#09101a" />
    <path d="M936 90 L936 44 L964 44 L964 20 L988 20 L988 90 Z" fill="#0d121c" />
    <polygon points="896,54 1000,2 1000,30 928,70" fill="url(#footer-beam)" opacity="0.48">
      <animateTransform attributeName="transform" type="rotate" values="-8 896 54;8 896 54;-8 896 54" dur="5.6s" repeatCount="indefinite" />
    </polygon>
  </g>

  <g transform="translate(50 44)">
    <text class="mono" fill="#{{ACCENT}}" font-size="14">signal.lock</text>
    <text y="40" class="display" fill="#{{TEXT}}" font-size="30">tracking {{DISPLAY_NAME}} across the city grid</text>
    <text y="70" class="mono" fill="#{{MUTED}}" font-size="15">live stats • contribution snake • snow layer • gotham-inspired motion • {{YEAR}}</text>
  </g>

  <g transform="translate(199 132)">
    <rect width="190" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <rect x="12" y="10" width="6" height="6" rx="3" fill="#{{ACCENT}}">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite" />
    </rect>
    <text x="102" y="16" text-anchor="middle" class="mono" fill="#{{ACCENT}}" font-size="12">dark_mode active</text>

    <rect x="206" width="190" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <rect x="218" y="10" width="6" height="6" rx="3" fill="#{{ACCENT_2}}">
      <animate attributeName="opacity" values="1;0.24;1" dur="1.9s" repeatCount="indefinite" />
    </rect>
    <text x="301" y="16" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="12">signal sweep live</text>

    <rect x="412" width="190" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <rect x="424" y="10" width="6" height="6" rx="3" fill="#{{TEXT}}">
      <animate attributeName="opacity" values="0.24;0.92;0.24" dur="2.2s" repeatCount="indefinite" />
    </rect>
    <text x="500" y="16" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="12">snake + skyline synced</text>
  </g>

  <line x1="50" y1="152" x2="950" y2="152" stroke="#{{EDGE}}" stroke-width="1" />
  <rect x="50" y="150" width="132" height="4" fill="url(#footer-glow)">
    <animate attributeName="x" values="50;818;50" dur="4.6s" repeatCount="indefinite" />
  </rect>

  <g transform="translate(844 42)" opacity="0.78">
    <path d="M0,-6 C-6,-10 -13,-9 -18,-2 C-23,-2 -29,-6 -34,-13 C-35,-7 -32,-1 -25,4 C-19,8 -14,9 -7,6 C-6,11 -3,15 0,18 C3,15 6,11 7,6 C14,9 19,8 25,4 C32,-1 35,-7 34,-13 C29,-6 23,-2 18,-2 C13,-9 6,-10 0,-6 Z" fill="#{{ACCENT}}">
      <animateTransform attributeName="transform" type="translate" values="0 0;26 -8;52 0" dur="8.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="8.6s" repeatCount="indefinite" />
    </path>
  </g>

  <text x="888" y="50" class="mono" fill="#{{ACCENT_2}}" font-size="14">exit 0 <tspan fill="#{{TEXT}}">█</tspan><tspan fill="#{{TEXT}}"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" /></tspan></text>
</svg>
