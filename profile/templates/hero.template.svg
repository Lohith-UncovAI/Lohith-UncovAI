    <path d="M0 120 L0 72 L26 72 L26 42 L58 42 L58 84 L88 84 L88 52 L116 52 L116 120 Z" fill="#06090f" />
    <path d="M96 120 L96 54 L136 54 L136 18 L170 18 L170 120 Z" fill="#0a0f18" />
    <path d="M156 120 L156 36 L194 36 L194 62 L224 62 L224 8 L258 8 L258 120 Z" fill="#0d121c" />
    <path d="M238 120 L238 50 L274 50 L274 18 L306 18 L306 120 Z" fill="#06090f" />
    <path d="M300 120 L300 26 L342 26 L342 -10 L372 -10 L372 120 Z" fill="#0d121c" />
