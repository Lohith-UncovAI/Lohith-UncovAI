<svg viewBox="0 0 1000 404" xmlns="http://www.w3.org/2000/svg" width="1000" height="404" role="img" aria-label="Gotham-inspired profile banner for {{DISPLAY_NAME}}">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#{{SKY_TOP}}" />
      <stop offset="46%" stop-color="#{{SKY_MID}}" />
      <stop offset="100%" stop-color="#{{SKY_BOTTOM}}" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="28%" r="92%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.84" />
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#fff9d2" stop-opacity="1" />
      <stop offset="70%" stop-color="#ffe187" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0.08" />
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0.48" />
      <stop offset="34%" stop-color="#{{ACCENT}}" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="beam-soft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0.22" />
      <stop offset="44%" stop-color="#{{ACCENT}}" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#{{PANEL_SOFT}}" />
      <stop offset="100%" stop-color="#{{PANEL}}" />
    </linearGradient>
    <linearGradient id="panel-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0" />
      <stop offset="50%" stop-color="#{{ACCENT}}" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#{{EDGE_SOFT}}" stroke-width="1" opacity="0.18" />
    </pattern>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="16" />
    </filter>
    <filter id="signal-glow">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="beam-clip">
      <rect x="0" y="0" width="1000" height="284" />
    </clipPath>
    <style>
      .display { font-family: "Ubuntu Condensed", "Ubuntu", "Avenir Next Condensed", "Segoe UI", sans-serif; letter-spacing: 0.5px; font-weight: 700; }
      .mono { font-family: "Ubuntu Mono", "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Ubuntu", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="404" fill="#{{BG}}" />
  <rect width="1000" height="284" fill="url(#sky)" />
  <rect width="1000" height="284" fill="url(#grid)" opacity="0.24" />
  <rect width="1000" height="404" fill="url(#vignette)" />

  <g opacity="0.66">
    <circle cx="82" cy="40" r="1.4" fill="#ffffff"><animate attributeName="opacity" values="0.12;0.62;0.12" dur="4.1s" repeatCount="indefinite" /></circle>
    <circle cx="162" cy="72" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.18;0.78;0.18" dur="5.2s" repeatCount="indefinite" /></circle>
    <circle cx="286" cy="44" r="1.1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.58;0.1" dur="3.4s" repeatCount="indefinite" /></circle>
    <circle cx="428" cy="86" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.14;0.76;0.14" dur="4.7s" repeatCount="indefinite" /></circle>
    <circle cx="710" cy="58" r="1.3" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.84;0.1" dur="5.1s" repeatCount="indefinite" /></circle>
    <circle cx="934" cy="42" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0.12;0.9;0.12" dur="5.8s" repeatCount="indefinite" /></circle>
  </g>

  <g filter="url(#soft-blur)" opacity="0.1">
    <ellipse cx="252" cy="170" rx="250" ry="38" fill="#{{FOG}}">
      <animateTransform attributeName="transform" type="translate" values="-18 0;14 0;-18 0" dur="14s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="796" cy="182" rx="236" ry="36" fill="#{{FOG}}">
      <animateTransform attributeName="transform" type="translate" values="16 0;-18 0;16 0" dur="13s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <circle cx="816" cy="82" r="56" fill="#{{ACCENT}}" opacity="0.08" filter="url(#soft-blur)" />
  <circle cx="816" cy="82" r="48" fill="url(#moon)" />
  <circle cx="816" cy="82" r="66" fill="none" stroke="#{{ACCENT}}" stroke-opacity="0.12">
    <animate attributeName="r" values="62;68;62" dur="3.8s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="0.08;0.18;0.08" dur="3.8s" repeatCount="indefinite" />
  </circle>

  <g transform="translate(752 76)" opacity="0.82">
    <path d="M0,-8 C-8,-16 -18,-14 -24,-4 C-31,-5 -39,-11 -47,-22 C-49,-10 -44,-1 -34,7 C-27,12 -19,14 -10,10 C-8,18 -4,24 0,30 C4,24 8,18 10,10 C19,14 27,12 34,7 C44,-1 49,-10 47,-22 C39,-11 31,-5 24,-4 C18,-14 8,-16 0,-8 Z" fill="#0b0e14">
      <animateTransform attributeName="transform" type="translate" values="0 0;24 -8;48 0" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.65;0.9;0.65" dur="9s" repeatCount="indefinite" />
    </path>
  </g>

  <g clip-path="url(#beam-clip)" transform="translate(680 258)">
    <circle cx="0" cy="0" r="7" fill="#{{ACCENT}}" opacity="0.34" />
    <circle cx="0" cy="0" r="18" fill="none" stroke="#{{ACCENT}}" stroke-opacity="0.2">
      <animate attributeName="r" values="10;28;10" dur="2.6s" repeatCount="indefinite" />
      <animate attributeName="stroke-opacity" values="0.24;0;0.24" dur="2.6s" repeatCount="indefinite" />
    </circle>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-9 0 0;8 0 0;-9 0 0" dur="7.4s" repeatCount="indefinite" />
      <polygon points="0,0 320,-188 394,-136 122,18" fill="url(#beam)" />
      <polygon points="0,0 290,-170 336,-136 100,18" fill="url(#beam-soft)" />
      <g transform="translate(210 -104) scale(1.14)" filter="url(#signal-glow)">
        <path d="M0,-10 C-8,-18 -18,-16 -24,-5 C-31,-6 -39,-12 -47,-23 C-49,-10 -44,-1 -34,7 C-27,12 -19,14 -10,10 C-8,17 -4,23 0,29 C4,23 8,17 10,10 C19,14 27,12 34,7 C44,-1 49,-10 47,-23 C39,-12 31,-6 24,-5 C18,-16 8,-18 0,-10 Z" fill="#{{ACCENT}}">
          <animate attributeName="opacity" values="0.52;0.94;0.52" dur="2.8s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="translate" values="0 0;0 -2;0 0" dur="2.8s" repeatCount="indefinite" />
        </path>
      </g>
    </g>
  </g>

  <g opacity="0.82">
    <circle cx="108" cy="-10" r="2" fill="#{{SNOW}}"><animate attributeName="cy" values="-10;420" dur="10.4s" repeatCount="indefinite" /><animate attributeName="cx" values="108;120;100" dur="10.4s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;0.9;0.9;0" dur="10.4s" repeatCount="indefinite" /></circle>
    <circle cx="224" cy="-22" r="1.5" fill="#{{SNOW}}"><animate attributeName="cy" values="-22;420" dur="9s" repeatCount="indefinite" begin="-2.2s" /><animate attributeName="cx" values="224;214;232" dur="9s" repeatCount="indefinite" begin="-2.2s" /><animate attributeName="opacity" values="0;0.76;0.76;0" dur="9s" repeatCount="indefinite" begin="-2.2s" /></circle>
    <circle cx="352" cy="-18" r="2.2" fill="#{{SNOW}}"><animate attributeName="cy" values="-18;420" dur="9.4s" repeatCount="indefinite" begin="-4.4s" /><animate attributeName="cx" values="352;364;342" dur="9.4s" repeatCount="indefinite" begin="-4.4s" /><animate attributeName="opacity" values="0;0.9;0.9;0" dur="9.4s" repeatCount="indefinite" begin="-4.4s" /></circle>
    <circle cx="486" cy="-14" r="1.7" fill="#{{SNOW}}"><animate attributeName="cy" values="-14;420" dur="8s" repeatCount="indefinite" begin="-1.4s" /><animate attributeName="cx" values="486;476;494" dur="8s" repeatCount="indefinite" begin="-1.4s" /><animate attributeName="opacity" values="0;0.68;0.68;0" dur="8s" repeatCount="indefinite" begin="-1.4s" /></circle>
    <circle cx="610" cy="-30" r="2" fill="#{{SNOW}}"><animate attributeName="cy" values="-30;420" dur="10.8s" repeatCount="indefinite" begin="-6.1s" /><animate attributeName="cx" values="610;622;600" dur="10.8s" repeatCount="indefinite" begin="-6.1s" /><animate attributeName="opacity" values="0;0.84;0.84;0" dur="10.8s" repeatCount="indefinite" begin="-6.1s" /></circle>
    <circle cx="738" cy="-24" r="1.6" fill="#{{SNOW}}"><animate attributeName="cy" values="-24;420" dur="8.2s" repeatCount="indefinite" begin="-2.8s" /><animate attributeName="cx" values="738;728;746" dur="8.2s" repeatCount="indefinite" begin="-2.8s" /><animate attributeName="opacity" values="0;0.74;0.74;0" dur="8.2s" repeatCount="indefinite" begin="-2.8s" /></circle>
    <circle cx="884" cy="-16" r="2" fill="#{{SNOW}}"><animate attributeName="cy" values="-16;420" dur="9.2s" repeatCount="indefinite" begin="-3.9s" /><animate attributeName="cx" values="884;896;876" dur="9.2s" repeatCount="indefinite" begin="-3.9s" /><animate attributeName="opacity" values="0;0.86;0.86;0" dur="9.2s" repeatCount="indefinite" begin="-3.9s" /></circle>
  </g>

