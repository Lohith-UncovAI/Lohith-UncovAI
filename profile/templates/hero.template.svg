  <g transform="translate(96 314)">
    <rect width="132" height="34" rx="17" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="66" y="22" text-anchor="middle" class="ui" fill="#{{ACCENT}}" font-size="14">{{TAGS_1}}</text>
    <rect x="148" width="132" height="34" rx="17" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="214" y="22" text-anchor="middle" class="ui" fill="#{{TEXT}}" font-size="14">{{TAGS_2}}</text>
    <rect x="296" width="132" height="34" rx="17" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="362" y="22" text-anchor="middle" class="ui" fill="#{{TEXT}}" font-size="14">{{TAGS_3}}</text>
    <rect x="444" width="132" height="34" rx="17" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="510" y="22" text-anchor="middle" class="ui" fill="#{{TEXT}}" font-size="14">{{TAGS_4}}</text>
