    <path d="M626 120 L626 50 L658 50 L658 10 L692 10 L692 120 Z" fill="#09101a" />
    <path d="M678 120 L678 20 L714 20 L714 -18 L748 -18 L748 120 Z" fill="#0d121c" />
    <path d="M742 120 L742 58 L774 58 L774 0 L808 0 L808 120 Z" fill="#06090f" />
    <path d="M804 120 L804 40 L840 40 L840 -20 L878 -20 L878 120 Z" fill="#0d121c" />
    <path d="M868 120 L868 24 L904 24 L904 56 L932 56 L932 -8 L964 -8 L964 120 Z" fill="#09101a" />
    <path d="M946 120 L946 52 L974 52 L974 22 L1000 22 L1000 120 Z" fill="#0d121c" />

    <g fill="#{{WINDOW}}" opacity="0.88">
      <rect x="108" y="78" width="6" height="8"><animate attributeName="opacity" values="0.18;0.88;0.18" dur="4.2s" repeatCount="indefinite" /></rect>
      <rect x="164" y="88" width="6" height="8"><animate attributeName="opacity" values="0.84;0.18;0.84" dur="5.4s" repeatCount="indefinite" /></rect>
      <rect x="196" y="88" width="6" height="8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.9s" repeatCount="indefinite" /></rect>
      <rect x="308" y="68" width="6" height="8"><animate attributeName="opacity" values="0.76;0.16;0.76" dur="4.6s" repeatCount="indefinite" /></rect>
      <rect x="716" y="46" width="6" height="8"><animate attributeName="opacity" values="0.14;0.92;0.14" dur="3.7s" repeatCount="indefinite" /></rect>
      <rect x="748" y="86" width="6" height="8"><animate attributeName="opacity" values="0.74;0.14;0.74" dur="5.1s" repeatCount="indefinite" /></rect>
      <rect x="884" y="72" width="6" height="8"><animate attributeName="opacity" values="0.18;0.94;0.18" dur="4.2s" repeatCount="indefinite" /></rect>
      <rect x="916" y="88" width="6" height="8"><animate attributeName="opacity" values="0.88;0.2;0.88" dur="6.2s" repeatCount="indefinite" /></rect>
    </g>
  </g>

  <g transform="translate(46 40)">
    <rect width="560" height="210" rx="24" fill="url(#panel-grad)" stroke="#{{EDGE}}" opacity="0.98" />
    <rect x="-140" y="0" width="140" height="210" fill="url(#panel-sweep)" opacity="0.18">
      <animate attributeName="x" values="-140;600;-140" dur="5.6s" repeatCount="indefinite" />
    </rect>
    <rect x="24" y="20" width="136" height="26" rx="13" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="92" y="37" text-anchor="middle" class="mono" fill="#{{ACCENT}}" font-size="12">NIGHT PROTOCOL</text>
    <text x="24" y="96" class="display" fill="#{{TEXT}}" font-size="84">{{DISPLAY_NAME}}</text>
    <text x="24" y="130" class="ui" fill="#{{STEEL}}" font-size="20">{{TAGLINE_LINES_1}}</text>
    <text x="24" y="154" class="ui" fill="#{{STEEL}}" font-size="20">{{TAGLINE_LINES_2}}</text>
    <text x="24" y="180" class="mono" fill="#{{MUTED}}" font-size="12">aws // kubernetes // genai delivery // stakeholder-facing execution</text>
    <line x1="24" y1="192" x2="202" y2="192" stroke="#{{ACCENT}}" stroke-width="4" stroke-linecap="round" />
    <rect x="24" y="198" width="160" height="4" rx="2" fill="#{{EDGE_SOFT}}" />
    <rect x="24" y="198" width="112" height="4" rx="2" fill="#{{ACCENT}}">
      <animate attributeName="width" values="92;156;108;92" dur="4.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <g transform="translate(646 40)">
    <rect width="308" height="210" rx="24" fill="url(#panel-grad)" stroke="#{{EDGE}}" opacity="0.98" />
    <rect x="-120" y="0" width="120" height="210" fill="url(#panel-sweep)" opacity="0.22">
      <animate attributeName="x" values="-120;340;-120" dur="4.9s" repeatCount="indefinite" />
    </rect>
    <text x="24" y="34" class="mono" fill="#{{ACCENT}}" font-size="13">career.signal</text>
    <text x="24" y="54" class="ui" fill="#{{MUTED}}" font-size="13">resume-driven snapshot</text>
    <circle cx="272" cy="32" r="5" fill="#{{ACCENT}}">
      <animate attributeName="opacity" values="0.24;1;0.24" dur="1.8s" repeatCount="indefinite" />
    </circle>

    <rect x="20" y="72" width="268" height="38" rx="14" fill="#020407" stroke="#{{EDGE}}" />
    <text x="36" y="92" class="display" fill="#{{TEXT}}" font-size="22">{{EXPERIENCE_1_COMPANY}}</text>
    <text x="36" y="106" class="ui" fill="#{{STEEL}}" font-size="12">{{EXPERIENCE_1_ROLE}}</text>
    <text x="274" y="92" text-anchor="end" class="mono" fill="#{{ACCENT}}" font-size="11">{{EXPERIENCE_1_PERIOD}}</text>

    <rect x="20" y="118" width="268" height="38" rx="14" fill="#020407" stroke="#{{EDGE}}" />
    <text x="36" y="138" class="display" fill="#{{TEXT}}" font-size="22">{{EXPERIENCE_2_COMPANY}}</text>
    <text x="36" y="152" class="ui" fill="#{{STEEL}}" font-size="12">{{EXPERIENCE_2_ROLE}}</text>
    <text x="274" y="138" text-anchor="end" class="mono" fill="#{{ACCENT_2}}" font-size="11">{{EXPERIENCE_2_PERIOD}}</text>

    <rect x="20" y="164" width="268" height="26" rx="13" fill="#020407" stroke="#{{EDGE}}" />
    <text x="36" y="181" class="display" fill="#{{TEXT}}" font-size="18">{{EXPERIENCE_3_COMPANY}}</text>
    <text x="274" y="181" text-anchor="end" class="mono" fill="#{{STEEL}}" font-size="11">{{EXPERIENCE_3_PERIOD}}</text>
    <text x="36" y="206" class="mono" fill="#{{MUTED}}" font-size="11">end-to-end ML delivery, MLOps release, and eval workflows</text>
