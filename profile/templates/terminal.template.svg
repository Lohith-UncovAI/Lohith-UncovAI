<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" width="1000" height="500" role="img" aria-label="Profile overview board for {{DISPLAY_NAME}}">
  <defs>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#{{PANEL_SOFT}}" />
      <stop offset="100%" stop-color="#{{PANEL}}" />
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#{{ACCENT}}" stop-opacity="0" />
      <stop offset="50%" stop-color="#{{ACCENT}}" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#{{ACCENT}}" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="chip-active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a4510" />
      <stop offset="100%" stop-color="#2b2108" />
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#{{EDGE_SOFT}}" stroke-width="1" opacity="0.18" />
    </pattern>
    <style>
      .display { font-family: "Ubuntu Condensed", "Ubuntu", "Avenir Next Condensed", "Segoe UI", sans-serif; letter-spacing: 0.45px; font-weight: 700; }
      .mono { font-family: "Ubuntu Mono", "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Ubuntu", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="500" fill="#{{BG}}" />
  <rect x="24" y="18" width="952" height="464" rx="24" fill="url(#panel-grad)" stroke="#{{EDGE}}" />
  <rect x="24" y="18" width="952" height="464" rx="24" fill="url(#grid)" opacity="0.12" />
  <rect x="-180" y="18" width="180" height="464" fill="url(#sheen)" opacity="0.18">
    <animate attributeName="x" values="-180;1120;-180" dur="7.2s" repeatCount="indefinite" />
  </rect>

  <text x="46" y="48" class="mono" fill="#{{ACCENT}}" font-size="13">profile.overview</text>
  <text x="954" y="48" text-anchor="end" class="mono" fill="#{{MUTED}}" font-size="12">resume-driven layout</text>

  <g transform="translate(46 68)">
    <rect width="212" height="64" rx="18" fill="#05080d" stroke="#{{EDGE}}" />
    <rect x="-80" y="0" width="80" height="64" fill="url(#accent-bar)" opacity="0.18">
      <animate attributeName="x" values="-80;292;-80" dur="4.8s" repeatCount="indefinite" />
    </rect>
    <rect x="18" y="14" width="66" height="3" rx="1.5" fill="#{{ACCENT}}" />
    <circle cx="188" cy="18" r="4" fill="#{{ACCENT}}">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite" />
    </circle>
    <text x="18" y="24" class="mono" fill="#{{MUTED}}" font-size="11">public contributions</text>
    <text x="18" y="52" class="display" fill="#{{TEXT}}" font-size="34">{{PUBLIC_CONTRIBUTIONS}}</text>
  </g>

  <g transform="translate(274 68)">
    <rect width="212" height="64" rx="18" fill="#05080d" stroke="#{{EDGE}}" />
    <rect x="18" y="14" width="52" height="3" rx="1.5" fill="#{{ACCENT_2}}" />
    <circle cx="188" cy="18" r="4" fill="#{{ACCENT_2}}">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite" />
    </circle>
    <text x="18" y="24" class="mono" fill="#{{MUTED}}" font-size="11">active days</text>
    <text x="18" y="52" class="display" fill="#{{TEXT}}" font-size="34">{{ACTIVE_DAYS}}</text>
  </g>

  <g transform="translate(502 68)">
    <rect width="212" height="64" rx="18" fill="#05080d" stroke="#{{EDGE}}" />
    <rect x="18" y="14" width="48" height="3" rx="1.5" fill="#{{ACCENT}}" />
    <text x="18" y="24" class="mono" fill="#{{MUTED}}" font-size="11">public repos</text>
    <text x="18" y="52" class="display" fill="#{{TEXT}}" font-size="34">{{PUBLIC_REPOS}}</text>
  </g>

  <g transform="translate(730 68)">
    <rect width="212" height="64" rx="18" fill="#05080d" stroke="#{{EDGE}}" />
    <rect x="18" y="14" width="42" height="3" rx="1.5" fill="#{{ACCENT_2}}" />
    <text x="18" y="24" class="mono" fill="#{{MUTED}}" font-size="11">followers</text>
    <text x="18" y="52" class="display" fill="#{{TEXT}}" font-size="34">{{FOLLOWERS}}</text>
  </g>

  <g transform="translate(46 154)">
    <rect width="548" height="272" rx="22" fill="#020407" stroke="#{{EDGE_SOFT}}" />
    <rect x="0" y="0" width="548" height="272" rx="22" fill="url(#grid)" opacity="0.1" />
    <text x="24" y="34" class="mono" fill="#{{ACCENT}}" font-size="13">about</text>
    <rect x="24" y="40" width="82" height="3" rx="1.5" fill="#{{ACCENT}}" />
    <text x="24" y="58" class="ui" fill="#{{STEEL}}" font-size="15">what I build and how I ship it</text>

    <circle cx="30" cy="90" r="4" fill="#{{ACCENT}}" />
    <text x="44" y="96" class="ui" fill="#{{TEXT}}" font-size="16">{{MISSION_1}}</text>
    <circle cx="30" cy="122" r="4" fill="#{{ACCENT_2}}" />
    <text x="44" y="128" class="ui" fill="#{{TEXT}}" font-size="16">{{MISSION_2}}</text>
    <circle cx="30" cy="154" r="4" fill="#{{TEXT}}" />
    <text x="44" y="160" class="ui" fill="#{{TEXT}}" font-size="16">{{MISSION_3}}</text>

    <text x="24" y="188" class="mono" fill="#{{ACCENT}}" font-size="13">recent path</text>
    <rect x="20" y="196" width="508" height="80" rx="16" fill="#05080d" stroke="#{{EDGE}}" />

    <text x="24" y="214" class="display" fill="#{{TEXT}}" font-size="22">{{EXPERIENCE_1_COMPANY}}</text>
    <text x="168" y="214" class="ui" fill="#{{STEEL}}" font-size="14">{{EXPERIENCE_1_ROLE}}</text>
    <text x="524" y="214" text-anchor="end" class="mono" fill="#{{ACCENT}}" font-size="11">{{EXPERIENCE_1_PERIOD}}</text>

    <text x="24" y="242" class="display" fill="#{{TEXT}}" font-size="22">{{EXPERIENCE_2_COMPANY}}</text>
    <text x="168" y="242" class="ui" fill="#{{STEEL}}" font-size="14">{{EXPERIENCE_2_ROLE}}</text>
    <text x="524" y="242" text-anchor="end" class="mono" fill="#{{ACCENT_2}}" font-size="11">{{EXPERIENCE_2_PERIOD}}</text>

    <text x="24" y="268" class="display" fill="#{{TEXT}}" font-size="18">{{EXPERIENCE_3_COMPANY}}</text>
    <text x="168" y="268" class="ui" fill="#{{STEEL}}" font-size="13">{{EXPERIENCE_3_ROLE}}</text>
    <text x="524" y="268" text-anchor="end" class="mono" fill="#{{STEEL}}" font-size="11">{{EXPERIENCE_3_PERIOD}}</text>
  </g>

  <g transform="translate(618 154)">
    <rect width="324" height="108" rx="22" fill="#020407" stroke="#{{EDGE_SOFT}}" />
    <rect x="0" y="0" width="324" height="108" rx="22" fill="url(#grid)" opacity="0.1" />
    <text x="20" y="32" class="mono" fill="#{{ACCENT}}" font-size="13">stack</text>

    <rect x="20" y="48" width="90" height="24" rx="12" fill="url(#chip-active)" stroke="#{{ACCENT_SOFT}}" />
    <text x="65" y="64" text-anchor="middle" class="mono" fill="#{{ACCENT}}" font-size="12">{{TOOLBELT_1}}</text>
    <rect x="118" y="48" width="90" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="163" y="64" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="12">{{TOOLBELT_2}}</text>
    <rect x="216" y="48" width="88" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="260" y="64" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="12">{{TOOLBELT_3}}</text>

    <rect x="20" y="78" width="90" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="65" y="94" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="12">{{TOOLBELT_4}}</text>
    <rect x="118" y="78" width="90" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="163" y="94" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="12">{{TOOLBELT_5}}</text>
    <rect x="216" y="78" width="88" height="24" rx="12" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="260" y="94" text-anchor="middle" class="mono" fill="#{{STEEL}}" font-size="12">{{TOOLBELT_6}}</text>
  </g>

  <g transform="translate(618 288)">
    <rect width="324" height="138" rx="22" fill="#020407" stroke="#{{EDGE_SOFT}}" />
    <rect x="0" y="0" width="324" height="138" rx="22" fill="url(#grid)" opacity="0.1" />
    <rect x="-80" y="0" width="80" height="138" fill="url(#accent-bar)" opacity="0.18">
      <animate attributeName="x" values="-80;404;-80" dur="5.2s" repeatCount="indefinite" />
    </rect>
    <text x="20" y="32" class="mono" fill="#{{ACCENT}}" font-size="13">org spotlight</text>
    <circle cx="292" cy="28" r="5" fill="#{{ACCENT}}">
      <animate attributeName="opacity" values="0.22;1;0.22" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <text x="20" y="62" class="display" fill="#{{TEXT}}" font-size="30">{{ORG_1_LABEL}}</text>
    <text x="20" y="84" class="ui" fill="#{{STEEL}}" font-size="14">production GenAI and evaluation workflows</text>
    <rect x="20" y="98" width="92" height="20" rx="10" fill="#{{PANEL_ALT}}" stroke="#{{EDGE}}" />
    <text x="66" y="112" text-anchor="middle" class="mono" fill="#{{MUTED}}" font-size="11">{{ORG_1_WEBSITE}}</text>
  </g>

  <g transform="translate(46 446)">
    <rect width="896" height="18" rx="9" fill="#04080e" stroke="#{{EDGE}}" />
    <rect x="-110" y="0" width="110" height="18" fill="url(#accent-bar)" opacity="0.22">
      <animate attributeName="x" values="-110;936;-110" dur="4.8s" repeatCount="indefinite" />
    </rect>
    <text x="14" y="12" class="mono" fill="#{{ACCENT}}" font-size="11">production systems • evaluation-first delivery • stakeholder communication</text>
    <circle cx="860" cy="9" r="2" fill="#{{ACCENT}}">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="872" cy="9" r="2" fill="#{{ACCENT_2}}">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite" />
    </circle>
    <circle cx="884" cy="9" r="2" fill="#{{TEXT}}">
      <animate attributeName="opacity" values="0.24;0.92;0.24" dur="2.4s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
