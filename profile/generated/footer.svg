<svg viewBox="0 0 1000 168" xmlns="http://www.w3.org/2000/svg" width="1000" height="168" role="img" aria-label="Footer banner for lohith">
  <defs>
    <linearGradient id="footer-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0" />
      <stop offset="50%" stop-color="#f5d25f" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="footer-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0.36" />
      <stop offset="30%" stop-color="#f5d25f" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="168" fill="#000000" />

  <g opacity="0.8">
    <circle cx="124" cy="-10" r="1.8" fill="#dce9ff">
      <animate attributeName="cy" values="-10;186" dur="7.4s" repeatCount="indefinite" />
      <animate attributeName="cx" values="124;136;118" dur="7.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="302" cy="-16" r="1.6" fill="#dce9ff">
      <animate attributeName="cy" values="-16;186" dur="6.2s" repeatCount="indefinite" begin="-1.3s" />
      <animate attributeName="cx" values="302;292;308" dur="6.2s" repeatCount="indefinite" begin="-1.3s" />
    </circle>
    <circle cx="506" cy="-8" r="2.1" fill="#dce9ff">
      <animate attributeName="cy" values="-8;186" dur="8s" repeatCount="indefinite" begin="-3.1s" />
      <animate attributeName="cx" values="506;516;498" dur="8s" repeatCount="indefinite" begin="-3.1s" />
    </circle>
    <circle cx="708" cy="-12" r="1.5" fill="#dce9ff">
      <animate attributeName="cy" values="-12;186" dur="5.8s" repeatCount="indefinite" begin="-2.2s" />
      <animate attributeName="cx" values="708;698;714" dur="5.8s" repeatCount="indefinite" begin="-2.2s" />
    </circle>
    <circle cx="880" cy="-18" r="2.3" fill="#dce9ff">
      <animate attributeName="cy" values="-18;186" dur="7.1s" repeatCount="indefinite" begin="-4.2s" />
      <animate attributeName="cx" values="880;892;874" dur="7.1s" repeatCount="indefinite" begin="-4.2s" />
    </circle>
  </g>

  <g transform="translate(0 62)">
    <path d="M0 86 L0 58 L24 58 L24 36 L52 36 L52 86 Z" fill="#06090f" />
    <path d="M40 86 L40 46 L74 46 L74 18 L100 18 L100 86 Z" fill="#0d121c" />
    <path d="M92 86 L92 56 L122 56 L122 10 L150 10 L150 86 Z" fill="#09101a" />
    <path d="M846 86 L846 48 L880 48 L880 18 L908 18 L908 86 Z" fill="#0d121c" />
    <path d="M892 86 L892 52 L920 52 L920 6 L950 6 L950 86 Z" fill="#09101a" />
    <path d="M938 86 L938 42 L966 42 L966 22 L988 22 L988 86 Z" fill="#0d121c" />
    <polygon points="898,54 1000,4 1000,30 928,70" fill="url(#footer-beam)" opacity="0.55">
      <animateTransform attributeName="transform" type="rotate" values="-8 898 54;8 898 54;-8 898 54" dur="5.8s" repeatCount="indefinite" />
    </polygon>
  </g>

  <text x="50" y="50" class="mono" fill="#f5d25f" font-size="14">signal.lock</text>
  <text x="50" y="84" class="ui" fill="#f6f9ff" font-size="28">tracking lohith across the city grid</text>
  <text x="50" y="114" class="mono" fill="#707b92" font-size="15">live stats • contribution snake • snow layer • gotham-inspired motion • 2026</text>

  <line x1="50" y1="138" x2="950" y2="138" stroke="#212735" stroke-width="1" />
  <rect x="50" y="136" width="132" height="4" fill="url(#footer-glow)">
    <animate attributeName="x" values="50;818;50" dur="4.8s" repeatCount="indefinite" />
  </rect>
  <text x="886" y="50" class="mono" fill="#8fb6ff" font-size="14">exit 0 <tspan fill="#f6f9ff">█</tspan><tspan fill="#f6f9ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" /></tspan></text>
</svg>
