    <text x="64" y="21" text-anchor="middle" class="ui" fill="#f5d25f" font-size="14">GenAI</text>
    <rect x="146" width="128" height="32" rx="16" fill="#090d15" stroke="#1d2330" />
    <text x="210" y="21" text-anchor="middle" class="ui" fill="#f6f9ff" font-size="14">MLOps</text>
    <rect x="292" width="128" height="32" rx="16" fill="#090d15" stroke="#1d2330" />
    <text x="356" y="21" text-anchor="middle" class="ui" fill="#f6f9ff" font-size="14">AWS</text>
    <rect x="438" width="128" height="32" rx="16" fill="#090d15" stroke="#1d2330" />
    <text x="502" y="21" text-anchor="middle" class="ui" fill="#f6f9ff" font-size="14">Kubernetes</text>
