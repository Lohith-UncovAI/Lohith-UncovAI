    <animate attributeName="stroke-opacity" values="0.08;0.18;0.08" dur="4s" repeatCount="indefinite" />
  </circle>

  <g transform="translate(748 78)" opacity="0.78">
    <path d="M0,-8 C-8,-16 -18,-14 -24,-4 C-31,-5 -39,-11 -47,-22 C-49,-10 -44,-1 -34,7 C-27,12 -19,14 -10,10 C-8,18 -4,24 0,30 C4,24 8,18 10,10 C19,14 27,12 34,7 C44,-1 49,-10 47,-22 C39,-11 31,-5 24,-4 C18,-14 8,-16 0,-8 Z" fill="#0b0e14">
      <animateTransform attributeName="transform" type="translate" values="0 0;22 -8;44 0" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.62;0.9;0.62" dur="9s" repeatCount="indefinite" />
    </path>
  </g>

