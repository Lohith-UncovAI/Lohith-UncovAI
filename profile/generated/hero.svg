<svg viewBox="0 0 1000 392" xmlns="http://www.w3.org/2000/svg" width="1000" height="392" role="img" aria-label="Gotham-inspired profile banner for lohith">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010103" />
      <stop offset="44%" stop-color="#04070c" />
      <stop offset="100%" stop-color="#070d15" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="24%" r="86%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.78" />
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fff8cf" stop-opacity="1" />
      <stop offset="65%" stop-color="#ffe184" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0.08" />
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0.62" />
      <stop offset="35%" stop-color="#f5d25f" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="panel-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10141d" />
      <stop offset="100%" stop-color="#04060a" />
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#111722" stroke-width="1" opacity="0.22" />
    </pattern>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="signal-glow">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="moon-glow">
      <feGaussianBlur stdDeviation="22" />
    </filter>
    <clipPath id="beam-clip">
      <rect x="0" y="0" width="1000" height="268" />
    </clipPath>
    <style>
      .display { font-family: "Impact", "Haettenschweiler", "Arial Narrow Bold", sans-serif; letter-spacing: 2px; }
      .mono { font-family: "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
