  <g transform="translate(42 34)">
    <rect width="560" height="220" rx="22" fill="url(#panel-sheen)" stroke="#1d2330" opacity="0.97" />
    <rect x="22" y="20" width="132" height="26" rx="13" fill="#090d15" stroke="#1d2330" />
    <text x="88" y="37" text-anchor="middle" class="mono" fill="#f5d25f" font-size="12">NIGHT PROTOCOL</text>
    <text x="24" y="94" class="display" fill="#f6f9ff" font-size="82">lohith</text>
    <text x="26" y="130" class="ui" fill="#b9c2d8" font-size="20">AI systems, backend flows, and developer tools after dark</text>
    <text x="26" y="164" class="mono" fill="#73819d" font-size="13">deeper black // ubuntu-style type // snow drift // signal sweep</text>
    <line x1="26" y1="180" x2="220" y2="180" stroke="#f5d25f" stroke-width="4" stroke-linecap="round" />
