<svg viewBox="0 0 1000 404" xmlns="http://www.w3.org/2000/svg" width="1000" height="404" role="img" aria-label="Gotham-inspired profile banner for lohith">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="52%" stop-color="#02040a" />
      <stop offset="100%" stop-color="#050910" />
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff9d2" stop-opacity="1" />
      <stop offset="72%" stop-color="#ffe187" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0.08" />
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="26%" r="92%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.86" />
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0.4" />
      <stop offset="36%" stop-color="#f5d25f" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1018" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>
    <linearGradient id="panel-sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="name-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cfd8e8" />
    </linearGradient>
    <linearGradient id="chip-active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a4510" />
      <stop offset="100%" stop-color="#2b2108" />
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#0f1520" stroke-width="1" opacity="0.16" />
    </pattern>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="16" />
    </filter>
    <style>
      .display { font-family: "Ubuntu Condensed", "Ubuntu", "Avenir Next Condensed", "Segoe UI", sans-serif; letter-spacing: 0.5px; font-weight: 700; }
      .mono { font-family: "Ubuntu Mono", "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Ubuntu", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="404" fill="#000000" />
  <rect width="1000" height="286" fill="url(#sky)" />
  <rect width="1000" height="286" fill="url(#grid)" opacity="0.22" />
  <rect width="1000" height="404" fill="url(#vignette)" />

  <g opacity="0.62">
