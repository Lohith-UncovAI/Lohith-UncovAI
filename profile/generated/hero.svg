    <text x="36" y="146" class="ui" fill="#b9c2d8" font-size="21">AI / ML engineer shipping GenAI,</text>
    <text x="36" y="172" class="ui" fill="#b9c2d8" font-size="21">MLOps, and hybrid cloud systems</text>

    <rect x="36" y="124" width="220" height="4" rx="2" fill="#0f1520" />
    <rect x="36" y="124" width="126" height="4" rx="2" fill="#f5d25f">
      <animate attributeName="width" values="96;188;126;96" dur="4.6s" repeatCount="indefinite" />
    </rect>

    <rect x="640" y="24" width="234" height="140" rx="18" fill="#05080d" stroke="#0f1520" />
    <rect x="652" y="34" width="88" height="22" rx="11" fill="url(#chip-active)" stroke="#a98a2d" />
    <text x="696" y="49" text-anchor="middle" class="mono" fill="#f5d25f" font-size="11">current arc</text>
    <circle cx="852" cy="42" r="5" fill="#f5d25f">
