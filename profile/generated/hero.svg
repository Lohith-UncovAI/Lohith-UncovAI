    </circle>
    <text x="660" y="88" class="display" fill="#f6f9ff" font-size="36">UncovAI</text>
    <text x="660" y="112" class="ui" fill="#b9c2d8" font-size="18">Data Scientist</text>
    <text x="660" y="136" class="mono" fill="#96b8ff" font-size="13">Dec 2025 - Present</text>
    <text x="660" y="160" class="ui" fill="#73819d" font-size="14">previously: Ansys and Amadeus</text>
