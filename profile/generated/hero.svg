<svg viewBox="0 0 1000 404" xmlns="http://www.w3.org/2000/svg" width="1000" height="404" role="img" aria-label="Gotham-inspired profile banner for lohith">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="48%" stop-color="#02040a" />
      <stop offset="100%" stop-color="#050910" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="28%" r="88%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.82" />
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#fff9d2" stop-opacity="1" />
      <stop offset="66%" stop-color="#ffe187" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0.08" />
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0.52" />
      <stop offset="32%" stop-color="#f5d25f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="beam-soft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0.24" />
      <stop offset="40%" stop-color="#f5d25f" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="panel-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1018" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#0f1520" stroke-width="1" opacity="0.2" />
    </pattern>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="16" />
    </filter>
    <filter id="moon-glow">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="signal-glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="beam-clip">
      <rect x="0" y="0" width="1000" height="276" />
    </clipPath>
    <style>
      .display { font-family: "Ubuntu Condensed", "Ubuntu", "Avenir Next Condensed", "Segoe UI", sans-serif; letter-spacing: 0.6px; font-weight: 700; }
      .mono { font-family: "Ubuntu Mono", "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Ubuntu", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="404" fill="#000000" />
  <rect width="1000" height="276" fill="url(#sky)" />
  <rect width="1000" height="276" fill="url(#grid)" opacity="0.32" />
  <rect width="1000" height="404" fill="url(#vignette)" />

  <g opacity="0.74">
    <circle cx="84" cy="36" r="1.4" fill="#ffffff"><animate attributeName="opacity" values="0.12;0.66;0.12" dur="4.1s" repeatCount="indefinite" /></circle>
    <circle cx="164" cy="74" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.18;0.8;0.18" dur="5.2s" repeatCount="indefinite" /></circle>
    <circle cx="286" cy="42" r="1.1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.58;0.1" dur="3.2s" repeatCount="indefinite" /></circle>
    <circle cx="434" cy="84" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.14;0.76;0.14" dur="4.7s" repeatCount="indefinite" /></circle>
    <circle cx="706" cy="58" r="1.3" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.84;0.1" dur="5.1s" repeatCount="indefinite" /></circle>
    <circle cx="936" cy="44" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0.12;0.9;0.12" dur="5.8s" repeatCount="indefinite" /></circle>
  </g>

  <g filter="url(#soft-blur)" opacity="0.12">
