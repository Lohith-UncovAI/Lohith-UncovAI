    <path d="M812 164 H876" stroke="#f5d25f" stroke-width="2" stroke-linecap="round" opacity="0.42" />

    <text x="34" y="36" class="mono" fill="#f5d25f" font-size="13">lohith // ai/ml engineer</text>
