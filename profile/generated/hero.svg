    <circle cx="176" cy="72" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.16;0.76;0.16" dur="5.3s" repeatCount="indefinite" /></circle>
    <circle cx="312" cy="46" r="1.1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.54;0.1" dur="3.6s" repeatCount="indefinite" /></circle>
    <circle cx="458" cy="84" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.14;0.72;0.14" dur="4.7s" repeatCount="indefinite" /></circle>
    <circle cx="730" cy="60" r="1.3" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.82;0.1" dur="5s" repeatCount="indefinite" /></circle>
    <circle cx="926" cy="46" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0.12;0.88;0.12" dur="5.8s" repeatCount="indefinite" /></circle>
  </g>

  <g filter="url(#soft-blur)" opacity="0.1">
