    <path d="M770 120 L770 58 L802 58 L802 0 L838 0 L838 120 Z" fill="#06090f" />
    <path d="M834 120 L834 40 L870 40 L870 -18 L908 -18 L908 120 Z" fill="#0d121c" />
    <path d="M900 120 L900 24 L936 24 L936 58 L964 58 L964 -4 L996 -4 L996 120 Z" fill="#09101a" />

    <g fill="#ffd86f" opacity="0.84">
      <rect x="116" y="84" width="6" height="8"><animate attributeName="opacity" values="0.18;0.88;0.18" dur="4.2s" repeatCount="indefinite" /></rect>
      <rect x="178" y="92" width="6" height="8"><animate attributeName="opacity" values="0.82;0.16;0.82" dur="5.2s" repeatCount="indefinite" /></rect>
      <rect x="318" y="68" width="6" height="8"><animate attributeName="opacity" values="0.74;0.14;0.74" dur="4.7s" repeatCount="indefinite" /></rect>
      <rect x="716" y="48" width="6" height="8"><animate attributeName="opacity" values="0.16;0.92;0.16" dur="3.9s" repeatCount="indefinite" /></rect>
      <rect x="848" y="78" width="6" height="8"><animate attributeName="opacity" values="0.18;0.94;0.18" dur="4.4s" repeatCount="indefinite" /></rect>
      <rect x="938" y="90" width="6" height="8"><animate attributeName="opacity" values="0.86;0.2;0.86" dur="6s" repeatCount="indefinite" /></rect>
    </g>
