<svg viewBox="0 0 1000 516" xmlns="http://www.w3.org/2000/svg" width="1000" height="516" role="img" aria-label="Profile control deck for lohith">
  <defs>
    <linearGradient id="console-shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1018" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="scan-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0" />
      <stop offset="50%" stop-color="#f5d25f" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bar-fill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#96b8ff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="status-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d25f" stop-opacity="0" />
      <stop offset="50%" stop-color="#f5d25f" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#f5d25f" stop-opacity="0" />
    </linearGradient>
    <pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="transparent" />
      <rect width="6" height="1" fill="#ffffff" opacity="0.02" />
    </pattern>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#0f1520" stroke-width="1" opacity="0.2" />
    </pattern>
    <clipPath id="shell-clip">
      <rect x="24" y="24" width="952" height="468" rx="18" />
    </clipPath>
    <style>
      .display { font-family: "Ubuntu Condensed", "Ubuntu", "Avenir Next Condensed", "Segoe UI", sans-serif; letter-spacing: 0.5px; font-weight: 700; }
      .mono { font-family: "Ubuntu Mono", "SFMono-Regular", "Consolas", "Liberation Mono", monospace; }
      .ui { font-family: "Ubuntu", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="516" fill="#000000" />
