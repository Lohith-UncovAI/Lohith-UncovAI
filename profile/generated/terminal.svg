<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" width="1000" height="560" role="img" aria-label="Profile overview board for lohith">
  <defs>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b1e" />
      <stop offset="100%" stop-color="#08081a" />
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5c518" stop-opacity="0" />
      <stop offset="50%" stop-color="#f5c518" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5c518" stop-opacity="0" />
      <stop offset="50%" stop-color="#f5c518" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="chip-active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2a06" />
      <stop offset="100%" stop-color="#1a1400" />
    </linearGradient>
    <linearGradient id="card-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c518" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#12122a" stroke-width="0.6" opacity="0.14" />
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.06" />
    </pattern>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .display { font-family: "Ubuntu Condensed", "Bebas Neue", "Oswald", "Impact", sans-serif; letter-spacing: 1.5px; font-weight: 700; }
      .mono { font-family: "Ubuntu Mono", "JetBrains Mono", "Fira Code", "SF Mono", "Consolas", monospace; letter-spacing: 0.35px; }
      .ui { font-family: "Ubuntu", "Inter", "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 500; }
    </style>
  </defs>

  <!-- Base -->
  <rect width="1000" height="560" fill="#05050a" />
  <rect x="24" y="18" width="952" height="524" rx="24" fill="url(#panel-grad)" stroke="#1a1a3a" stroke-opacity="0.6" />
  <rect x="24" y="18" width="952" height="524" rx="24" fill="url(#grid)" opacity="0.1" />
  <rect x="24" y="18" width="952" height="524" rx="24" fill="url(#scanlines)" opacity="0.3" />
  <!-- Moving sheen -->
  <rect x="-200" y="18" width="200" height="524" fill="url(#sheen)" opacity="0.3">
    <animate attributeName="x" values="-200;1100;-200" dur="6s" repeatCount="indefinite" />
  </rect>
  <!-- Corner accents -->
  <path d="M36 30 H64" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M36 30 V54" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M940 490 H964" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
  <path d="M964 468 V490" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />

  <text x="46" y="48" class="mono" fill="#f5c518" font-size="12">BATCOMPUTER // PROFILE.OVERVIEW</text>
  <text x="954" y="48" text-anchor="end" class="mono" fill="#6a6a8a" font-size="11">SECURE CHANNEL</text>

  <!-- Stat cards row -->
  <g transform="translate(46 68)">
    <!-- Public Contributions -->
    <rect width="212" height="68" rx="16" fill="#0a0a18" stroke="#1a1a3a" stroke-opacity="0.5" />
    <rect width="212" height="68" rx="16" fill="url(#card-glow)" />
    <rect x="-80" y="0" width="80" height="68" fill="url(#accent-bar)" opacity="0.2">
      <animate attributeName="x" values="-80;292;-80" dur="4.2s" repeatCount="indefinite" />
    </rect>
    <rect x="16" y="14" width="66" height="3" rx="1.5" fill="#f5c518" />
    <circle cx="188" cy="18" r="4" fill="#f5c518" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite" />
    </circle>
    <circle cx="188" cy="18" r="9" fill="none" stroke="#f5c518" stroke-opacity="0.2">
      <animate attributeName="r" values="7;13;7" dur="1.6s" repeatCount="indefinite" />
      <animate attributeName="stroke-opacity" values="0.2;0;0.2" dur="1.6s" repeatCount="indefinite" />
    </circle>
    <text x="16" y="24" class="mono" fill="#6a6a8a" font-size="10">PUBLIC CONTRIBUTIONS</text>
    <text x="16" y="56" class="display" fill="#e8e8f0" font-size="34">79</text>
  </g>

  <g transform="translate(274 68)">
    <!-- Active Days -->
    <rect width="212" height="68" rx="16" fill="#0a0a18" stroke="#1a1a3a" stroke-opacity="0.5" />
    <rect x="16" y="14" width="52" height="3" rx="1.5" fill="#4a7aff" />
    <circle cx="188" cy="18" r="4" fill="#4a7aff" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite" />
    </circle>
    <text x="16" y="24" class="mono" fill="#6a6a8a" font-size="10">ACTIVE DAYS</text>
    <text x="16" y="56" class="display" fill="#e8e8f0" font-size="34">40</text>
  </g>

  <g transform="translate(502 68)">
    <!-- Public Repos -->
    <rect width="212" height="68" rx="16" fill="#0a0a18" stroke="#1a1a3a" stroke-opacity="0.5" />
    <rect x="16" y="14" width="48" height="3" rx="1.5" fill="#f5c518" />
    <text x="16" y="24" class="mono" fill="#6a6a8a" font-size="10">PUBLIC REPOS</text>
    <text x="16" y="56" class="display" fill="#e8e8f0" font-size="34">1</text>
  </g>

  <g transform="translate(730 68)">
    <!-- Followers -->
    <rect width="212" height="68" rx="16" fill="#0a0a18" stroke="#1a1a3a" stroke-opacity="0.5" />
    <rect x="16" y="14" width="42" height="3" rx="1.5" fill="#4a7aff" />
    <text x="16" y="24" class="mono" fill="#6a6a8a" font-size="10">FOLLOWERS</text>
    <text x="16" y="56" class="display" fill="#e8e8f0" font-size="34">0</text>
  </g>

  <!-- About section -->
  <g transform="translate(46 160)">
    <rect width="548" height="324" rx="20" fill="#060612" stroke="#12122a" stroke-opacity="0.5" />
    <rect x="0" y="0" width="548" height="324" rx="20" fill="url(#grid)" opacity="0.08" />
    <rect x="0" y="0" width="548" height="324" rx="20" fill="url(#scanlines)" opacity="0.2" />

    <text x="24" y="32" class="mono" fill="#f5c518" font-size="12">MISSION.LOG</text>
    <rect x="24" y="38" width="82" height="2" rx="1" fill="#f5c518" opacity="0.6">
      <animate attributeName="width" values="60;100;60" dur="4s" repeatCount="indefinite" />
    </rect>
    <text x="24" y="58" class="ui" fill="#9898b8" font-size="15">what I build and how I ship it</text>

    <!-- Mission items with animated dots -->
    <circle cx="30" cy="94" r="4" fill="#f5c518" filter="url(#glow-sm)">
      <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" />
    </circle>
    <text x="44" y="100" class="ui" fill="#e8e8f0" font-size="16">production GenAI on AWS + Kubernetes</text>
    <circle cx="30" cy="132" r="4" fill="#4a7aff" filter="url(#glow-sm)">
      <animate attributeName="r" values="3;5;3" dur="3.4s" repeatCount="indefinite" />
    </circle>
    <text x="44" y="138" class="ui" fill="#e8e8f0" font-size="16">evaluation, release, and MLOps workflow automation</text>
    <circle cx="30" cy="170" r="4" fill="#e8e8f0" filter="url(#glow-sm)">
      <animate attributeName="r" values="3;5;3" dur="3.8s" repeatCount="indefinite" />
    </circle>
    <text x="44" y="176" class="ui" fill="#e8e8f0" font-size="16">client-facing delivery and technical communication</text>

    <!-- Experience records -->
    <text x="24" y="214" class="mono" fill="#f5c518" font-size="12">RECENT.PATH</text>
    <rect x="20" y="226" width="508" height="82" rx="14" fill="#0a0a18" stroke="#1a1a3a" stroke-opacity="0.4" />
    <!-- Scan line on experience -->
    <rect x="20" y="226" width="0" height="82" rx="14" fill="url(#accent-bar)" opacity="0.15">
      <animate attributeName="width" values="0;508;0" dur="5s" repeatCount="indefinite" />
    </rect>

    <text x="28" y="248" class="display" fill="#e8e8f0" font-size="21">UncovAI</text>
    <text x="168" y="248" class="ui" fill="#9898b8" font-size="14">Data Scientist</text>
    <text x="524" y="248" text-anchor="end" class="mono" fill="#f5c518" font-size="11">Dec 2025 - Present</text>

    <text x="28" y="274" class="display" fill="#e8e8f0" font-size="21">Ansys</text>
    <text x="168" y="274" class="ui" fill="#9898b8" font-size="14">DevSecOps / MLOps Engineer</text>
    <text x="524" y="274" text-anchor="end" class="mono" fill="#4a7aff" font-size="11">Mar 2025 - Oct 2025</text>

    <text x="28" y="298" class="display" fill="#e8e8f0" font-size="18">Amadeus</text>
    <text x="168" y="298" class="ui" fill="#9898b8" font-size="13">AI / ML Engineer</text>
    <text x="524" y="298" text-anchor="end" class="mono" fill="#9898b8" font-size="11">Summer 2024</text>
  </g>

  <!-- Stack section -->
  <g transform="translate(618 160)">
    <rect width="324" height="132" rx="20" fill="#060612" stroke="#12122a" stroke-opacity="0.5" />
    <rect x="0" y="0" width="324" height="132" rx="20" fill="url(#grid)" opacity="0.08" />
    <text x="20" y="30" class="mono" fill="#f5c518" font-size="12">ARSENAL</text>
    <!-- Animated line -->
    <rect x="20" y="36" width="40" height="2" rx="1" fill="#f5c518" opacity="0.5">
      <animate attributeName="width" values="30;60;30" dur="3.5s" repeatCount="indefinite" />
    </rect>

    <rect x="20" y="58" width="88" height="26" rx="13" fill="url(#chip-active)" stroke="#a38410" />
    <text x="64" y="75" text-anchor="middle" class="mono" fill="#f5c518" font-size="11">Python</text>
    <rect x="116" y="58" width="88" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
    <text x="160" y="75" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">AWS</text>
    <rect x="212" y="58" width="92" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
    <text x="258" y="75" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">Kubernetes</text>

    <rect x="20" y="92" width="88" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
    <text x="64" y="109" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">MLflow</text>
    <rect x="116" y="92" width="88" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
    <text x="160" y="109" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">Kubeflow</text>
    <rect x="212" y="92" width="92" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
    <text x="258" y="109" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">SageMaker</text>
  </g>

  <!-- Org spotlight -->
  <g transform="translate(618 316)">
    <rect width="324" height="156" rx="20" fill="#060612" stroke="#12122a" stroke-opacity="0.5" />
    <rect x="0" y="0" width="324" height="156" rx="20" fill="url(#grid)" opacity="0.08" />
    <rect x="-80" y="0" width="80" height="156" fill="url(#accent-bar)" opacity="0.2">
      <animate attributeName="x" values="-80;404;-80" dur="4.8s" repeatCount="indefinite" />
    </rect>
    <text x="20" y="30" class="mono" fill="#f5c518" font-size="12">ORG.SPOTLIGHT</text>
    <!-- Animated beacon -->
    <circle cx="296" cy="26" r="5" fill="#f5c518" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="296" cy="26" r="12" fill="none" stroke="#f5c518" stroke-opacity="0.2">
      <animate attributeName="r" values="8;18;8" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="stroke-opacity" values="0.2;0;0.2" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <text x="20" y="64" class="display" fill="#e8e8f0" font-size="28">UncovAI</text>
    <text x="20" y="88" class="ui" fill="#9898b8" font-size="14">production GenAI and evaluation workflows</text>
    <rect x="20" y="110" width="108" height="22" rx="11" fill="#0e0e22" stroke="#1a1a3a" />
    <text x="74" y="125" text-anchor="middle" class="mono" fill="#6a6a8a" font-size="10">uncovai.com/</text>
    <!-- Mini bat -->
    <g transform="translate(160 138)" opacity="0.25">
      <path d="M0,-3 C-2,-5 -6,-4 -8,-1 C-10,-2 -13,-4 -16,-7 C-16,-3 -14,0 -11,2 C-9,4 -6,4 -4,3 C-2,6 -1,7 0,9 C1,7 2,6 4,3 C6,4 9,4 11,2 C14,0 16,-3 16,-7 C13,-4 10,-2 8,-1 C6,-4 2,-5 0,-3 Z" fill="#f5c518" />
    </g>
  </g>

  <!-- Bottom status bar -->
  <g transform="translate(46 510)">
    <rect width="896" height="20" rx="10" fill="#060612" stroke="#1a1a3a" stroke-opacity="0.4" />
    <rect x="-120" y="0" width="120" height="20" fill="url(#accent-bar)" opacity="0.25">
      <animate attributeName="x" values="-120;1020;-120" dur="4s" repeatCount="indefinite" />
    </rect>
    <text x="14" y="14" class="mono" fill="#f5c518" font-size="10">GOTHAM SYSTEMS ONLINE // PRODUCTION READY // EVALUATION-FIRST</text>
    <!-- Status dots -->
    <circle cx="856" cy="10" r="3" fill="#f5c518" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="870" cy="10" r="3" fill="#4a7aff">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="884" cy="10" r="3" fill="#e8e8f0">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.1s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
