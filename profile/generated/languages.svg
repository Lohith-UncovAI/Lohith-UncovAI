<svg viewBox="0 0 1000 332" xmlns="http://www.w3.org/2000/svg" width="1000" height="332" role="img" aria-label="Language mix for lohith">
  <defs>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b1e" />
      <stop offset="100%" stop-color="#08081a" />
    </linearGradient>
    <linearGradient id="bar-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e8f0" stop-opacity="0" />
      <stop offset="50%" stop-color="#e8e8f0" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#e8e8f0" stop-opacity="0" />
    </linearGradient>
    <clipPath id="mix-clip">
      <rect x="44" y="138" width="912" height="24" rx="12" />
    </clipPath>
    <radialGradient id="marker-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c518" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0" />
    </radialGradient>
    <style>
      .display { font-family: "Ubuntu Condensed", "Bebas Neue", "Oswald", "Impact", sans-serif; letter-spacing: 1.5px; font-weight: 700; }
      .ui { font-family: "Ubuntu", "Inter", "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 500; }
      .mono { font-family: "Ubuntu Mono", "JetBrains Mono", "Fira Code", "SF Mono", "Consolas", monospace; letter-spacing: 0.35px; }
    </style>
  </defs>
  <rect width="1000" height="332" fill="#05050a" />
  <rect x="24" y="18" width="952" height="296" rx="20" fill="url(#panel-grad)" stroke="#1a1a3a" stroke-opacity="0.6" />
  <text x="44" y="50" class="mono" fill="#f5c518" font-size="12">LANGUAGE.ANALYSIS</text>
  <text x="44" y="84" class="display" fill="#e8e8f0" font-size="38">PUBLIC REPO LANGUAGE SPREAD</text>
  <text x="44" y="114" class="ui" fill="#9898b8" font-size="15">weighted by owned public repos, with larger labels and darker telemetry spacing for GitHub profile view.</text>
  <text x="952" y="50" text-anchor="end" class="mono" fill="#6a6a8a" font-size="11">OWNED PUBLIC REPOS</text>
  <rect x="44" y="138" width="912" height="24" rx="12" fill="#0e0e22" />
  <rect x="44" y="138" width="912" height="24" rx="12" fill="#f5c518" />
  <g clip-path="url(#mix-clip)">
    <rect x="-120" y="138" width="120" height="24" fill="url(#bar-sweep)" opacity="0.42">
      <animate attributeName="x" values="-120;1020;-120" dur="4.8s" repeatCount="indefinite" />
    </rect>
    <circle cx="44" cy="150" r="9" fill="url(#marker-glow)" opacity="0.58">
      <animate attributeName="cx" values="44;956;44" dur="6.2s" repeatCount="indefinite" />
    </circle>
  </g>
  <circle cx="54" cy="191" r="6" fill="#f5c518">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <text x="74" y="196" class="ui" fill="#e8e8f0" font-size="20">Python</text>
  <text x="948" y="196" text-anchor="end" class="mono" fill="#9898b8" font-size="16">100.0%</text>
  <text x="948" y="114" text-anchor="end" class="mono" fill="#6a6a8a" font-size="12">public orgs hidden or none</text>
  <rect x="274.5" y="276" width="140" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
  <text x="344.5" y="293" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">top Python</text>
  <rect x="426.5" y="276" width="140" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
  <text x="496.5" y="293" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">repos 1</text>
  <rect x="578.5" y="276" width="147" height="26" rx="13" fill="#0e0e22" stroke="#1a1a3a" />
  <text x="652.0" y="293" text-anchor="middle" class="mono" fill="#9898b8" font-size="11">public repos only</text>
</svg>