name: Update Profile

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate README and local SVG sections
        run: python3 profile/generate.py

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23f4d35e&color_dots=%2304060b,%23101827,%23273246,%237f8aa3,%23f4d35e
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23f4d35e&color_dots=%2304060b,%23101827,%23273246,%237f8aa3,%23f4d35e

      - name: Add dark background to snake
        run: python3 profile/add_snake_bg.py dist 04060b

      - name: Push snake assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md profile/generated/
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile assets"
          git push
